<!doctype html>
<html lang="ja" data-theme="light" class="sl-theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="w-screen h-screen overflow-hidden">
    <div class="flex flex-col h-full">
      <!-- ヘッダー（固定） -->
      <header class="shrink-0 p-4 border-b">
        <sl-button id="theme-toggle" size="small">🌙</sl-button>
      </header>

      <!-- スクロール領域 -->
      <main class="flex-1 min-h-0 overflow-y-auto">
        <div class="max-w-xl mx-auto p-6 space-y-6">
          <sl-input label="お名前"></sl-input>

          <!-- textarea はスクロールさせない -->
          <sl-textarea
            label="お問い合わせ内容"
            rows="6"
            resize="auto"
          ></sl-textarea>

          <sl-button variant="primary" class="w-full"> 送信 </sl-button>
        </div>
        <div class="bg-primary text-primary-contrast">OK</div>

        <sl-button variant="success">OK</sl-button>
      </main>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
