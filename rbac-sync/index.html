<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>RBAC Admin</title>

    <!-- Tailwind v4 -->
    <link rel="stylesheet" href="./dist/styles.css" />

    <!-- Shoelace -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.0/dist/shoelace.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.0/dist/themes/light.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.0/dist/themes/dark.css"
    />
  </head>

  <body
    class="h-screen flex bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100"
  >
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white p-4 space-y-2">
      <h2 class="text-xl font-bold mb-4">RBAC Tables</h2>

      <sl-button variant="text" class="w-full" onclick="loadTable('groups')"
        >Groups</sl-button
      >
      <sl-button variant="text" class="w-full" onclick="loadTable('roles')"
        >Roles</sl-button
      >
      <sl-button variant="text" class="w-full" onclick="loadTable('routes')"
        >Routes</sl-button
      >
      <sl-button
        variant="text"
        class="w-full"
        onclick="loadTable('permissions')"
        >Permissions</sl-button
      >
      <sl-button
        variant="text"
        class="w-full"
        onclick="loadTable('group_members')"
        >Group Members</sl-button
      >
      <sl-button
        variant="text"
        class="w-full"
        onclick="loadTable('group_roles')"
        >Group Roles</sl-button
      >
      <sl-button
        variant="text"
        class="w-full"
        onclick="loadTable('route_group_roles')"
        >Route Group Roles</sl-button
      >
      <sl-button variant="text" class="w-full" onclick="loadRbacTree()"
        >RBAC Tree</sl-button
      >

      <hr class="border-gray-700 my-4" />

      <sl-button variant="success" class="w-full" onclick="syncRbac()"
        >RBAC Sync</sl-button
      >

      <hr class="border-gray-700 my-4" />

      <sl-switch id="theme-switch" checked>Dark Mode</sl-switch>
    </aside>

    <!-- Main Content -->
    <main id="content" class="flex-1 p-6 overflow-auto">
      <h1 class="text-2xl font-bold mb-4">RBAC Admin</h1>
      <div id="table-container"></div>
      <div id="tree-container" class="mt-8"></div>
    </main>

    <!-- Create Dialog -->
    <sl-dialog id="create-dialog">
      <h3 slot="label">Create New</h3>
      <form id="create-form" class="space-y-4"></form>
      <sl-button slot="footer" variant="primary" onclick="submitCreateForm()"
        >Save</sl-button
      >
    </sl-dialog>

    <!-- Edit Dialog -->
    <sl-dialog id="edit-dialog">
      <h3 slot="label">Edit</h3>
      <form id="edit-form" class="space-y-4"></form>
      <sl-button slot="footer" variant="primary" onclick="submitEditForm()"
        >Save</sl-button
      >
    </sl-dialog>

    <script src="./main.js"></script>
  </body>
</html>
